<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标准计算机 - Standard Computer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .scene {
            position: relative;
            width: 900px;
            height: 700px;
            perspective: 1200px;
        }

        /* ===== 显示器 ===== */
        .monitor {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 520px;
            height: 320px;
        }

        .monitor-bezel {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
        }

        .monitor-screen {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .screen-content {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
            display: flex;
            flex-direction: column;
            padding: 20px;
            animation: screenOn 2s ease-out;
        }

        @keyframes screenOn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .taskbar {
            height: 30px;
            background: linear-gradient(180deg, #2d2d2d, #1a1a1a);
            border-radius: 4px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
        }

        .taskbar-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff5f57;
        }
        .taskbar-dot:nth-child(2) { background: #febc2e; }
        .taskbar-dot:nth-child(3) { background: #28c840; }

        .desktop-icons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            flex: 1;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .icon-label {
            color: #8b949e;
            font-size: 10px;
            text-align: center;
        }

        .icon:nth-child(1) .icon-box { background: linear-gradient(135deg, #667eea, #764ba2); }
        .icon:nth-child(2) .icon-box { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .icon:nth-child(3) .icon-box { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .icon:nth-child(4) .icon-box { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .icon:nth-child(5) .icon-box { background: linear-gradient(135deg, #fa709a, #fee140); }
        .icon:nth-child(6) .icon-box { background: linear-gradient(135deg, #a8edea, #fed6e3); }
        .icon:nth-child(7) .icon-box { background: linear-gradient(135deg, #d299c2, #fef9d7); }
        .icon:nth-child(8) .icon-box { background: linear-gradient(135deg, #89f7fe, #66a6ff); }

        .monitor-stand {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 40px;
            background: linear-gradient(180deg, #333, #222);
            border-radius: 0 0 8px 8px;
        }

        .monitor-base {
            position: absolute;
            bottom: -55px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 15px;
            background: linear-gradient(180deg, #444, #222);
            border-radius: 50%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        .monitor-logo {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 10px;
            letter-spacing: 2px;
        }

        .power-led {
            position: absolute;
            bottom: 8px;
            right: 20px;
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== 主机箱 ===== */
        .computer-case {
            position: absolute;
            bottom: 80px;
            right: 80px;
            width: 200px;
            height: 350px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 8px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.05);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .case-front-panel {
            height: 60px;
            background: linear-gradient(145deg, #333, #222);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10px;
        }

        .usb-port {
            width: 30px;
            height: 12px;
            background: #111;
            border-radius: 2px;
            border: 1px solid #444;
            position: relative;
        }

        .usb-port::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 6px;
            background: #222;
            border-radius: 1px;
        }
