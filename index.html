<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

<title>宇宙飞船大战</title>

<style>

  * {

    box-sizing: border-box;

    -webkit-tap-highlight-color: transparent;

  }

  html, body {

    margin: 0;

    padding: 0;

    overflow: hidden;

    background: #030712;

    color: white;

    font-family: Arial, "Microsoft YaHei", sans-serif;

    touch-action: none;

  }

  canvas {

    display: block;

    width: 100vw;

    height: 100vh;

    background: radial-gradient(circle at center, #111827 0%, #020617 70%);

  }

  #ui {

    position: fixed;

    top: 10px;

    left: 10px;

    right: 10px;

    z-index: 5;

    display: flex;

    justify-content: space-between;

    align-items: flex-start;

    pointer-events: none;

    font-size: 14px;

    text-shadow: 0 0 6px black;

  }

  #leftInfo {

    line-height: 1.7;

  }

  #pauseBtn {

    pointer-events: auto;

    border: 1px solid rgba(255,255,255,0.35);

    background: rgba(15,23,42,0.75);

    color: white;

    border-radius: 10px;

    padding: 8px 12px;

    font-size: 14px;

  }

  #menu {

    position: fixed;

    inset: 0;

    z-index: 10;

    display: flex;

    flex-direction: column;

    justify-content: center;

    align-items: center;

    background: rgba(2,6,23,0.86);

    text-align: center;

    padding: 24px;

  }

  #menu h1 {

    margin: 0 0 12px;

    font-size: 32px;

    letter-spacing: 2px;

  }

  #menu p {

    max-width: 420px;

    line-height: 1.8;

    color: #cbd5e1;

  }

  #startBtn {

    margin-top: 18px;

    border: none;

    border-radius: 14px;

    padding: 12px 24px;

    font-size: 18px;

    color: white;

    background: linear-gradient(135deg, #2563eb, #7c3aed);

  }

  #tip {

    position: fixed;

    bottom: 16px;

    left: 0;

    right: 0;

    text-align: center;

    z-index: 4;

    color: rgba(255,255,255,0.6);

    font-size: 13px;

    pointer-events: none;

  }

</style>

</head>

<body>

<canvas id="game"></canvas>

<div id="ui">

  <div id="leftInfo">

    <div>分数：<span id="score">0</span></div>

    <div>生命：<span id="hp">100</span></div>

    <div>最高分：<span id="best">0</span></div>

  </div>

  <button id="pauseBtn">暂停</button>

</div>

<div id="tip">手指按住并拖动控制飞船，松手也会继续自动射击</div>

<div id="menu">

  <h1>宇宙飞船大战</h1>

  <p>

    手指拖动飞船躲避敌方弹幕。<br>

    飞船会自动射击。击毁敌机得分。<br>

    偶尔会掉落回血和护盾道具。

  </p>

  <button id="startBtn">开始游戏</button>

</div>

<script>

(() => {

  const canvas = document.getElementById("game");

  const ctx = canvas.getContext("2d");

  const scoreEl = document.getElementById("score");

  const hpEl = document.getElementById("hp");

    W = window.innerWidth;

    H = window.innerHeight;

    canvas.width = Math.floor(W * DPR);

    canvas.height = Math.floor(H * DPR);

    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  }

  window.addEventListener("resize", resize);

  resize();

  let best = Number(localStorage.getItem("spaceBattleBest") || 0);

  bestEl.textContent = best;

  let paused = false;

  let gameOver = false;

  let lastTime = 0;

  let score = 0;

  let difficulty = 1;

    y: H * 0.78,

    tx: W / 2,

    ty: H * 0.78,

    r: 16,

    hp: 100,

    maxHp: 100,

    fireTimer: 0,

    invincible: 0,

    shield: 0

  };

  let stars = [];

  let enemies = [];

  let particles = [];

  let items = [];

    return Math.random() * (max - min) + min;

  }

  function clamp(v, min, max) {

    return Math.max(min, Math.min(max, v));

  }

  function dist(a, b) {

    const dx = a.x - b.x;

    const dy = a.y - b.y;

    return Math.sqrt(dx * dx + dy * dy);

  }

  function resetGame() {

    score = 0;

    difficulty = 1;

    bullets = [];

    enemies = [];

    particles = [];

    items = [];

    gameOver = false;

    paused = false;

    player.x = W / 2;

    player.y = H * 0.78;

    player.tx = player.x;

    player.ty = player.y;

    player.hp = player.maxHp;

    player.fireTimer = 0;

    player.invincible = 1.5;

    player.shield = 0;

      stars.push({

        x,

        vx: rand(-180, 180),

        vy: rand(-180, 180),

        life: rand(0.25, 0.7),

        maxLife: rand(0.25, 0.7),

        r: rand(2, 5),

        color

      });

    }

  }

  function drawPlayer() {

    ctx.save();

    ctx.translate(player.x, player.y);

    if (player.invincible > 0) {

      ctx.globalAlpha = 0.55 + Math.sin(Date.now() / 80) * 0.25;

    }

    if (player.shield > 0) {

      ctx.beginPath();

      ctx.arc(0, 0, 28, 0, Math.PI * 2);

      ctx.strokeStyle = "rgba(96,165,250,0.9)";

      ctx.lineWidth = 3;

      ctx.stroke();

    }

    ctx.moveTo(0, -22);

    ctx.lineTo(15, 18);

    ctx.lineTo(0, 11);

    ctx.lineTo(-15, 18);

    ctx.closePath();

    ctx.fillStyle = "#60a5fa";

    ctx.fill();

    ctx.beginPath();

    ctx.moveTo(0, -14);

    ctx.lineTo(7, 10);

    ctx.lineTo(-7, 10);

    ctx.closePath();

    ctx.fillStyle = "#e0f2fe";

    ctx.fill();

    ctx.beginPath();

    ctx.moveTo(-8, 20);

    ctx.lineTo(0, 34 + Math.sin(Date.now() / 80) * 5);

    ctx.lineTo(8, 20);

    ctx.closePath();

    ctx.fillStyle = "#fb923c";

    ctx.fill();

    ctx.restore();

  }

  function drawEnemy(e) {

    ctx.save();

    ctx.translate(e.x, e.y);

    if (e.type === "boss") {

      ctx.fillStyle = "#dc2626";

      ctx.beginPath();

      ctx.roundRect(-42, -22, 84, 44, 10);

      ctx.fill();

      ctx.fillStyle = "#fca5a5";

      ctx.beginPath();

      ctx.arc(0, 0, 12, 0, Math.PI * 2);

      ctx.fill();

      const barW = 90;

      ctx.fillStyle = "rgba(0,0,0,0.5)";

      ctx.fillRect(-barW / 2, -38, barW, 6);

      ctx.fillStyle = "#22c55e";

      ctx.fillRect(-barW / 2, -38, barW * (e.hp / e.maxHp), 6);

    } else {

      ctx.fillStyle = e.type === "shooter" ? "#a855f7" : e.type === "zigzag" ? "#f59e0b" : "#ef4444";

      ctx.beginPath();

      ctx.moveTo(0, 18);

      ctx.lineTo(17, -15);

      ctx.lineTo(-17, -15);
