<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #2d3748;
        }

        .subtitle {
            color: #718096;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .info {
            text-align: left;
            margin: 25px 0;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-item .icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #f7fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 18px;
        }

        .info-item .text {
            flex: 1;
        }

        .info-item .label {
            font-size: 12px;
            color: #a0aec0;
            margin-bottom: 2px;
        }

        .info-item .value {
            font-size: 15px;
            color: #2d3748;
            font-weight: 500;
        }

        .links {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: #edf2f7;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #a0aec0;
        }

        .time {
            margin-top: 15px;
            font-size: 14px;
            color: #718096;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">👋</div>
        <h1>你好，世界</h1>
        <p class="subtitle">这是我的 GitHub Pages 主页</p>

        <div class="info">
            <div class="info-item">
                <div class="icon">🚀</div>
                <div class="text">
                    <div class="label">项目</div>
                    <div class="value">GitHub Pages 静态网站</div>
                </div>
            </div>
            <div class="info-item">
                <div class="icon">⚡</div>
                <div class="text">
                    <div class="label">技术</div>
                    <div class="value">HTML + CSS</div>
                </div>
            </div>
            <div class="info-item">
                <div class="icon">📅</div>
                <div class="text">
                    <div class="label">创建于</div>
                    <div class="value">2026年6月</div>
                </div>
            </div>
        </div>

        <div class="links">
            <a href="https://github.com" target="_blank" class="btn btn-primary">
                <span>⭐</span> GitHub
            </a>
            <a href="#" class="btn btn-secondary">
                <span>📧</span> 联系我
            </a>
        </div>

        <div class="time" id="clock">--:--:--</div>
        <div class="footer">Powered by GitHub Pages</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-CN', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('clock').textContent = timeString;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
